<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: black; color: #ff1493; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        #text { font-size: 40px; font-weight: bold; text-shadow: 0 0 20px #ff1493; }
        #heart { font-size: 100px; display: none; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="text"></div>
    <div id="heart">❤️</div>

    <script>
        const words = ["3", "2", "1", "Я", "ТЕБЯ", "ЛЮБЛЮ", "ДИАНОЧКА", "ТЫ У МЕНЯ", "САМАЯ ЛУЧШАЯ", "И ЕДИНСТВЕННАЯ"];
        let i = 0;
        const display = document.getElementById("text");
        const heart = document.getElementById("heart");

        function show() {
            if (i < words.length) {
                display.innerText = words[i];
                i++;
                setTimeout(show, 1200);
            } else {
                display.style.display = "none";
                heart.style.display = "block";
            }
        }
        
        // Запуск через 1 секунду после загрузки
        setTimeout(show, 1000);
    </script>
</body>
</html>
