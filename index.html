<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Дианочки</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background: radial-gradient(circle, #4a001f 0%, #000000 100%);
            display: flex; justify-content: center; align-items: center;
        }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; }
        #text-container {
            position: relative; z-index: 2; text-align: center;
            font-family: 'Arial', sans-serif; pointer-events: none;
        }
        #message {
            font-size: 3.5rem; font-weight: bold; color: white;
            text-shadow: 0 0 20px #ff1493, 0 0 40px #ff1493;
            opacity: 0; transition: all 1s ease-in-out;
        }
        #final-heart {
            font-size: 10rem; display: none; animation: pulse 1.5s infinite;
            text-shadow: 0 0 50px #ff1493;
        }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.2);} 100% {transform: scale(1);} }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="text-container">
        <div id="message"></div>
        <div id="final-heart">❤️</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let hearts = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for(let i=0; i<200; i++) {
                hearts.push({
                    x: Math.random()*canvas.width,
                    y: Math.random()*canvas.height,
                    size: Math.random()*15 + 5,
                    vel: Math.random()*2 + 1,
                    op: Math.random()
                });
            }
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            hearts.forEach(h => {
                ctx.globalAlpha = h.op;
                ctx.fillStyle = '#ff69b4';
                ctx.font = h.size + 'px serif';
                ctx.fillText('❤️', h.x, h.y);
                h.y += h.vel;
                if(h.y > canvas.height) h.y = -20;
            });
            requestAnimationFrame(draw);
        }

        const words = ["3", "2", "1", "Я", "ТЕБЯ", "ЛЮБЛЮ", "ДИАНОЧКА", "ТЫ У МЕНЯ", "САМАЯ ЛУЧШАЯ", "И ЕДИНСТВЕННАЯ"];
        let idx = 0;
        const msg = document.getElementById('message');

        function play() {
            if(idx < words.length) {
                msg.style.opacity = 0;
                setTimeout(() => {
                    msg.innerText = words[idx];
                    msg.style.opacity = 1;
                    idx++;
                    setTimeout(play, 1800);
                }, 500);
            } else {
                msg.style.display = 'none';
                document.getElementById('final-heart').style.display = 'block';
            }
        }

        init(); draw(); play();
        window.onresize = init;
    </script>
</body>
</html>
