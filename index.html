<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Послание для тебя</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
            color: #ff007f; /* Ярко-розовый цвет для эффекта */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #matrix {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        #message-container {
            text-align: center;
        }

        #message {
            font-size: 3em;
            font-weight: bold;
            text-shadow: 0 0 10px #ff007f;
        }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <div id="message-container">
        <div id="message">Я</div>
    </div>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.height = window.innerHeight;
        canvas.width = window.innerWidth;

        const characters = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];

        for (let x = 0; x < columns; x++)
            drops[x] = 1;

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#ff007f";
            ctx.font = fontSize + "px Courier New";

            for (let i = 0; i < drops.length; i++) {
                const text = characters.charAt(Math.floor(Math.random() * characters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975)
                    drops[i] = 0;

                drops[i]++;
            }
        }

        setInterval(draw, 33);

        const messages = ["Я", "ТЕБЯ", "ЛЮБЛЮ", ""];
        let messageIndex = 0;
        const messageElement = document.getElementById('message');

        function changeMessage() {
            if (messageIndex < messages.length - 1) {
                messageElement.innerText = messages[messageIndex];
                messageIndex++;
            } else {
                messageElement.innerText = ""; // Или можно оставить последнее слово
                clearInterval(messageInterval); // Остановка смены сообщений
                // Тут можно добавить появление финальной картинки, если хочешь
            }
        }

        const messageInterval = setInterval(changeMessage, 2000); // Смена текста каждые 2 секунды

    </script>
</body>
</html>
